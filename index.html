<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Virtual Diary | Rachh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
    /* 1. Global & Background Setup */
    body {
        /* Deep Space Gradient */
        background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Poppins', sans-serif;
        /* Scroll fix yahan hai */
        overflow-x: hidden; 
        position: relative;
    }

    /* Moving Stars Background */
    body::before {
        content: "";
        position: fixed; 
        top: 0;
        left: 0;
        width: 100%; /* Ise 100% kar diya scroll rokne ke liye */
        height: 100%;
        background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
        opacity: 0.6;
        z-index: -1;
        /* Animation on small scale taaki scroll na trigger ho */
        animation: moveStars 100s linear infinite;
        pointer-events: none;
    }

    @keyframes moveStars {
        from { transform: scale(1); }
        to { transform: scale(1.1); } /* Movement ki jagah scale use kiya taaki width na badhe */
    }

    /* 2. Book Wrapper */
    .book-wrapper {
        background: linear-gradient(135deg, #1a0a2e 0%, #050112 100%);
        padding: 20px;
        border-radius: 15px;
        position: relative;
        border: 1px solid rgba(147, 51, 234, 0.2);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), 
                    0 0 20px rgba(147, 51, 234, 0.15);
    }

    /* 3. Book Container */
    .book {
        width: 800px;
        height: 520px;
        position: relative;
        perspective: 3000px;
    }

    /* 4. Page & Leaf Styling */
    .leaf {
        position: absolute;
        width: 50%;
        height: 100%;
        right: 0;
        transform-origin: left center;
        transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1);
        transform-style: preserve-3d;
        z-index: 1;
    }

    .page {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #fdf6e3;
        backface-visibility: hidden;
        padding: 35px;
        box-sizing: border-box;
        text-align: justify;
        hyphens: none !important;
        word-break: keep-all;
        overflow-wrap: normal;
        font-size: 15px;
        line-height: 1.6;
        overflow: hidden;
        border: none !important;
        box-shadow: none !important; 
    }

    .front {
        z-index: 2;
        border-radius: 0 5px 5px 0;
        box-shadow: inset -5px 0 10px rgba(0,0,0,0.02) !important;
    }

    .back {
        transform: rotateY(-180deg);
        z-index: 1;
        border-radius: 5px 0 0 5px;
        box-shadow: inset 5px 0 10px rgba(0,0,0,0.02) !important;
    }

    .flipped {
        transform: rotateY(-180deg) skewY(-1deg) scale(1.01);
    }

    .spine {
        position: absolute;
        left: 50%;
        width: 1px;
        height: 100%;
        background: rgba(0,0,0,0.05);
        z-index: 20;
        transform: translateX(-50%);
        pointer-events: none;
    }

    /* 5. Controls & Buttons */
    .controls {
        margin-top: 40px;
        display: flex;
        gap: 20px;
    }

    button {
        padding: 12px 35px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);
        color: #e0e0e0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        backdrop-filter: blur(10px);
        transition: 0.4s;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    button:hover {
        background: rgba(139, 92, 246, 0.3);
        border-color: #a78bfa;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        transform: translateY(-2px);
    }

    /* 6. Mobile View Fix */
    @media (max-width: 850px) {
        .book {
            width: 92vw;
            height: 60vh;
        }
        .book-wrapper {
            padding: 10px;
        }
        .page {
            padding: 20px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            font-size: 12px;
        }
    }

    /* 7. Twinkling Stars */
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.3;
        animation: twinkle var(--duration) infinite ease-in-out;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
    }
</style>
</head>

<body>

    <div class="book-wrapper">
        <div class="spine"></div>
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button onclick="prevPage()">Previous</button>
        <button onclick="nextPage()">Next Page</button>
    </div>
    <script>
        const textData = "HEY !! i'm Rachittt... Nevermind it doesn't matter whatever my name is. I dont think so anyone is going to find this weirdo virtual diary. Cuz only i've link to access this so makes sense right 😄. Idk what am i gonna write in this i usually feel sometimes and i think maybe i should note down my feelings somehwere so yeah here i'm. Ummmm is there need of any kind of brief about me i don't think so :) I'm rn at the best ages of a human could have according to some bullshit philosophers. Cuz i dont even think there's something best at least 10% of the the word they call &quot;Best&quot;. I feel everything is so shitty and irritating because I can't cope with people around me. Living away from the family the <strong>REAL LOVED ONEs</strong> feels so sad at that random interval of midnight. Talking about my personal experience, I feel like I'm in some kind of trap or prison. I don't get the vibe from anyone among my friends; everyone feels like a 🐍. Moreover, with time we get to know that all the things are just like imaginary myths. This life is yours, this journey is yours, and all the emotional attachments, the workload, and all the stuff that are under a superclass called OVERTHINKING—all these things only you have to handle. ";

        const book = document.getElementById('book');
        let leaves = [];
        let currentLeaf = 0;

        function paginate() {
            // Clear previous content to avoid duplication
            book.innerHTML = '<div class="spine"></div>';
            leaves = [];
            currentLeaf = 0;

            let tempDiv = document.createElement('div');
            // Padding fix: box-sizing ensures padding is inside the 400px
            tempDiv.style.cssText = "width:400px; padding:35px; line-height:1.6; font-size:15px; font-family:'Poppins', sans-serif; visibility:hidden; position:absolute; box-sizing:border-box; text-align:justify; hyphens:none; word-break:keep-all;";
            document.body.appendChild(tempDiv);

            let words = textData.split(' ');
            let pagesText = [];
            let currentText = "";

            for (let word of words) {
                let testText = currentText + word + " ";
                tempDiv.innerHTML = testText;

                // Height safety margin: 520px total - padding
                if (tempDiv.scrollHeight > 490) {
                    pagesText.push(currentText);
                    currentText = word + " ";
                } else {
                    currentText = testText;
                }
            }
            pagesText.push(currentText);
            document.body.removeChild(tempDiv);

            for (let i = 0; i < pagesText.length; i += 2) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.style.zIndex = Math.floor(pagesText.length / 2) - Math.floor(i / 2);

                leaf.innerHTML = `
                <div class="page front">${pagesText[i] || ""}</div>
                <div class="page back">${pagesText[i + 1] || "..."}</div>
            `;
                book.appendChild(leaf);
                leaves.push(leaf);
            }
        }

        // Wait for fonts to load before paginating to fix first-load issue
        if (document.fonts) {
            document.fonts.ready.then(() => {
                paginate();
            });
        } else {
            window.onload = paginate;
        }

        function nextPage() {
            if (currentLeaf < leaves.length) {
                const leaf = leaves[currentLeaf];
                leaf.classList.add('flipped');
                leaf.style.zIndex = currentLeaf + 100;
                currentLeaf++;
            }
        }

        function prevPage() {
            if (currentLeaf > 0) {
                currentLeaf--;
                const leaf = leaves[currentLeaf];
                leaf.classList.remove('flipped');
                leaf.style.zIndex = leaves.length - currentLeaf;
            }
        }

        function createStars() {
            const container = document.createElement('div');
            container.className = 'stars-container';
            document.body.appendChild(container);

            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // Random size, position aur animation duration
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');

                container.appendChild(star);
            }
        }

        // Isko paginate ke sath call karein
        window.onload = function () {
            paginate();
            createStars();
        };
    </script>
</body>

</html>
