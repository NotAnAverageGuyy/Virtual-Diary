<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Virtual Diary | By Rachittt</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .book-wrapper {
            background: #3e2723;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #2d1b18;
            position: relative;
        }

        .book {
            width: 90vw;
            max-width: 800px;
            height: 520px;
            position: relative;
            perspective: 3000px;
        }

        .leaf {
            position: absolute;
            width: 50%;
            height: 100%;
            right: 0;
            transform-origin: left center;
            transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            z-index: 1;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f5f5dc;
            backface-visibility: hidden;
            padding: 35px;
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.05);
            border-radius: 0 5px 5px 0;
            text-align: justify;

            hyphens: none !important;
            word-break: keep-all;
            overflow-wrap: normal;

            font-size: 15px;
            line-height: 1.6;
            overflow: hidden;
        }

        .front {
            z-index: 2;
            background: linear-gradient(to right, #fdf6e3 95%, #e0e0c0 100%);
        }

        .back {
            transform: rotateY(-180deg);
            z-index: 1;
            border-radius: 5px 0 0 5px;
            background: linear-gradient(to left, #fdf6e3 95%, #e0e0c0 100%);
        }

        .flipped {
            transform: rotateY(-180deg) skewY(-1deg) scale(1.01);
        }

        .spine {
            position: absolute;
            left: 50%;
            width: 0;
            height: 100%;
            background: none;
            z-index: 20;
        }

        .controls {
            margin-top: 40px;
        }

        button {
            padding: 12px 35px;
            cursor: pointer;
            background: #9d9b9b;
            color: #d7ccc8;
            border: 1px solid #444;
            border-radius: 50px;
            transition: 0.4s;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background: #5d4037;
            box-shadow: 0 0 15px rgba(93, 64, 55, 0.4);
            transform: translateY(-2px);
        }

        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body {
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.99;
            animation: moveStars 100s linear infinite;
            z-index: -1;
        }

        @keyframes moveStars {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-50%, -50%);
            }
        }

        .book-wrapper {
            background: linear-gradient(135px, #2c1a4d 0%, #0f0524 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(89, 45, 150, 0.3), 0 50px 100px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;

            border: 1px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 30px rgba(197, 27, 194, 0.211),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        button {
            padding: 12px 35px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: rgba(106, 27, 154, 0.4);
            border-color: #9c27b0;
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.6);
            transform: translateY(-3px);
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
                box-shadow: 0 0 10px white;
            }
        }

        .page {
            box-sizing: border-box;
        }

        .book-wrapper {
            max-width: 100vw;
        }

        /*pop msg ki styling*/
        #galaxyNoticeOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #050816, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.galaxyNoticeBox {
  background: rgba(5,10,40,0.85);
  border: 1px solid #6aa9ff;
  padding: 30px;
  border-radius: 18px;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 25px #6aa9ff;
  max-width: 320px;
}

.galaxyNoticeBox button {
  margin-top: 15px;
  padding: 10px 22px;
  border: none;
  background: #6aa9ff;
  color: white;
  border-radius: 12px;
  cursor: pointer;
}
    </style>
</head>

<body>

    <div class="book-wrapper">
        <div class="spine"></div>
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button onclick="prevPage()">Previous</button>
        <button onclick="nextPage()">Next Page</button>
    </div>

    <div id="galaxyNoticeOverlay">
  <div class="galaxyNoticeBox">
    <h2>A L E R T</h2>
    <p>For best experience, open in Laptop/PC</p>
    <button onclick="hideGalaxyNotice()">Enter</button>
  </div>
</div>


    <script>
        const textData = "HEY !! i'm Rachittt... Nevermind it doesn't matter whatever my name is. I dont think so anyone is going to find this weirdo virtual diary. Cuz only i've link to access this so makes sense right 😄. Idk what am i gonna write in this i usually feel sometimes and i think maybe i should note down my feelings somehwere so yeah here i'm. Ummmm is there need of any kind of brief about me i don't think so :) I'm rn at the best ages of a human could have according to some bullshit philosophers. Cuz i dont even think there's something best at least 10% of the the word they call &quot;Best&quot;. I feel everything is so shitty and irritating because I can't cope with people around me. Living away from the family the <strong>REAL LOVED ONEs</strong> feels so sad at that random interval of midnight. Talking about my personal experience, I feel like I'm in some kind of trap or prison. I don't get the vibe from anyone among my friends; everyone feels like a 🐍. Moreover, with time we get to know that all the things are just like imaginary myths. This life is yours, this journey is yours, and all the emotional attachments, the workload, and all the stuff that are under a superclass called OVERTHINKING—all these things only you have to handle. We've grown watching movies and web series, which puts a thought in our minds that one day someone will come into his/her life making things easy, whom you'll share every part of your life with. We expect our partner will stay with us in our bad times and in good times. But this isn't the true story; the fact is that we're digging a graveyard of our emotions by expecting anything from others. These internet, web series things have made us believe that there's someone who is a soulmate and blah blah... But by the time when we came to realize these things, it was too late because till then we were caught in a prison of being lonely. Okayy enough of this english FvCK this sh*t. Agar me meri baat kru to i'm not that kinda guy jiske college me bohot dost honge ekdum cool, thug type naaahhh i'm very different kabhi kabhi lagta hai me bakiyo se sachme ajeeb hu pata nai but ab nature hi aisa ho gaya hai mera ki i don't like crowd, many ppls in life, connecting with everyone... I know sounds stupid but yeah aisa hi hu me; me harr kisi chij me khushiyan nai dhundh pata mera connection bohot jyada limited hai mere around bass meri family <3 aur 1-2 dost hai; ab to vo dost bhi dogle lagte hai fr aur time ke sath sath i also felt that i found my soulmate at higher school i found a girl. She was very different use pehli baar dekh ke aisi feeling aayi jo kisi ladki ko dekh ke nai aayi 🤌. Usne mask lagaya tha cute pink specs long silky hair pretty eyes 🫠. I thought OMG rachit r u in love. But then yeah, I suddenly remembered I look like wet concrete. Aur its normal to think ki mujhe itni pyari lagne wali ladki baki ladko ko kyu nai lagegi. But i got her 🥹. But the journey in between this phase—I can't tell you how much I've broken myself. I've lost myself. I've got plenty of insecurities, and yes, now I've got a scary feeling that I'll end up losing that person too. Dil humare bhi toote hai ek baar nai baar baar tute. But I praised her alot, believing she completes me. Now when I look at myself, I'm blank. I don't know what I'm going to do in life. Will I ever become her life partner? Will she stay with me forever, unlike the past when I got cheated? Will this relationship work? Can I make things better? Should I become selfish? Can I make my family happy and make them proud? I have a lot of questions like this because I'm an overthinker.";

        const book = document.getElementById('book');
        let leaves = [];
        let currentLeaf = 0;

        function paginate() {
            // Clear previous content to avoid duplication
            book.innerHTML = '<div class="spine"></div>';
            leaves = [];
            currentLeaf = 0;

            let tempDiv = document.createElement('div');
            // Padding fix: box-sizing ensures padding is inside the 400px
            tempDiv.style.cssText = "width:400px; padding:35px; line-height:1.6; font-size:15px; font-family:'Poppins', sans-serif; visibility:hidden; position:absolute; box-sizing:border-box; text-align:justify; hyphens:none; word-break:keep-all;";
            document.body.appendChild(tempDiv);

            let words = textData.split(' ');
            let pagesText = [];
            let currentText = "";

            for (let word of words) {
                let testText = currentText + word + " ";
                tempDiv.innerHTML = testText;

                // Height safety margin: 520px total - padding
                if (tempDiv.scrollHeight > 490) {
                    pagesText.push(currentText);
                    currentText = word + " ";
                } else {
                    currentText = testText;
                }
            }
            pagesText.push(currentText);
            document.body.removeChild(tempDiv);

            for (let i = 0; i < pagesText.length; i += 2) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.style.zIndex = Math.floor(pagesText.length / 2) - Math.floor(i / 2);

                leaf.innerHTML = `
                <div class="page front">${pagesText[i] || ""}</div>
                <div class="page back">${pagesText[i + 1] || "..."}</div>
            `;
                book.appendChild(leaf);
                leaves.push(leaf);
            }
        }

        // Wait for fonts to load before paginating to fix first-load issue
        if (document.fonts) {
            document.fonts.ready.then(() => {
                paginate();
            });
        } else {
            window.onload = paginate;
        }

        function nextPage() {
            if (currentLeaf < leaves.length) {
                const leaf = leaves[currentLeaf];
                leaf.classList.add('flipped');
                leaf.style.zIndex = currentLeaf + 100;
                currentLeaf++;
            }
        }

        function prevPage() {
    if (currentLeaf > 0) {
        currentLeaf--;
        const leaf = leaves[currentLeaf];
        leaf.style.zIndex = currentLeaf + 100;
        leaf.classList.remove('flipped');
        setTimeout(() => {
            leaf.style.zIndex = leaves.length - currentLeaf;
        }, 1400); 
    }
}

        function createStars() {
            const container = document.createElement('div');
            container.className = 'stars-container';
            document.body.appendChild(container);

            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // Random size, position aur animation duration
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');

                container.appendChild(star);
            }
        }

        // Isko paginate ke sath call karein
        window.onload = function () {
            paginate();
            createStars();
        };

        //pop alert msg 
        function hideGalaxyNotice() {
  document.getElementById("galaxyNoticeOverlay").style.display = "none";
}
    </script>
</body>

</html>
