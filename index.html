i was not able to get into VIT due to some ducumentation problems then i'd to take drop because no other option was left with me then i cracked CET with 96%ile and got into VIT. Situation like this made my parents like this and i'm a kid that looks sad most of the time i mean i'm not but looking at my face anyone could tell that so mom-dad took extra care of me that i'm not taking any kinda tension or worrying more about anything. But main point was to keep my parents happy and it's like im happy then my parents are also happy.                  [NEWPAGE] Secondly, jo mere family ke alawa bhi meri family hai yessss you're right i'm talking about my soulmate. Mujhe bhi nai pata me itna pyaar kaise krne lag gaya meri gf se, aisa hota hai na ki ek sabse khubsurat flower ke aage baki flowers ke upr dhyaan nai jata vese hi uske alawa mujhe kabhi kisi ladki ke taraf dekhna psnd nai aya. Uska hona nai hona itna matter krta hai mere liye ki jaise meri majoirty of life usi pe depend krti hai. Vo meri besttestttt friend hai ngl. Mene mummy ko bhi introduce kraya tha kahi na kahi mummy ko bhi pata hai i love her so much aur mujhe mummy se kuch bhi chupana bilkul nai psnd i tell her everything happening in my life obv not everything but jo major hota hai voi bass. So yeah i wanna live my rest of life with her. Aur bohot se chije chalti hai mere dimag me ki kya humari shadi ho payegi ki nai uske ghar wale manenge ki nai mere shyd man jayenge most probably. Bass kabhi kabhi darr bhi laga rehta hai kahi vo chodh ke naa chali jaye mujhe me akela padd jaunga bilkul vo chali jayegi to aur mujhe pata hai me aise situation me fass jaunga ki usse bahar nai nikal paunga me. Kyuki khud hi socho ladkiyo ke pass kitne option rehte hai. But un sabme usne mujhe chuna pata nai achi baat hai ya nai kyuki if you're insecure ki bc meri hi bandi ko saab psnd kyu krte hai then you've to cope with it.              [NEWPAGE] One might also think yahi baat se vo replace ho jayega. But then comes my second face of emotion, i often think pyaar vyaar apne liye hai hi nai. Ngl kabhi kabhi lagta hai mene pyaar krna sikha hi kyu. Sometimes it feels like to leave everything and just vanish off.                [NEWPAGE] Sometimes it feels this LDR won't work like recently she said she wants some space to focus on herself. I mean i respect her decision relationship bojh bhi nai lagna chahiye so we became bestfriends again. Although mujhe pata hai ki ye saab krne se ulta hum dono aur durr chale jayenge ek dusre se however she ensured me by saying she'll be loyal for me forever but think logically ek baar bharosa tutne ke baad i can't become the default version of me right? Kyuki uss incident ne mujhe insecure to bana hi diya hai na. Mujhe to lagta hai ab ki things won't be same. Dheere dheere hum strangers ban rhe hai. I know she is very easily influenced by anyone. Idk what it is but i dont feel she loves me the way i do. Alright leave that boring part.. Ye sab to hote rehta hi hai mere sath. Lets just know different things apart of this..                     [NEWPAGE] Yep so i randomly sometimes think of the purpose of 'Life' like think why is this world even existing out of nowhere there's earth and humans live on that & i even think like what humans have done on earth. Its so suprising we built a civilization things that feels impossible like wireless data transmission, putting many chips inside a processor, going away from earth and touching mars or moon seems so crazy right. And we know world is so ahead there's too much to know about many things to explore nature, mythology, technology, peoples, country, fashion and many more... And then we look at ourself realising we've just started steping up stairs. OFC all these things are not that easy to achieve but think of it everybody who did these was not born with knowledgeable personality. When i look at my classmates in colleges, coaching, schools i see no excitement like me. I mean they just enjoy the current phase of their life. I'm not blaming them but i just wonder what must be there dreams that they want to achieve. Looking at me i want to explore every possible thing that seem cool to me. Also getting a crazyass sports car. And just living peacfully throughout the life with a cute family. And i know i've to grind hard for that            [NEWPAGE][NEWPAGE] Today is 3rd July and its been two weeks we had no convo... Remember when she said she needs some space to focus on herself and i said <strong> \"I'm afraid that i'll end up lossing her.\" </strong> i was right though. I'm disappointed that i've to beg infront of someone to prioritize me as i do. But slowly i'm realising the fact we can't force someone to love us the way we do. Maybe she never loved me because if she did things won't look like this. I don't get it if a person who is in love with someone how can he survive without even having a 10 minutes convo with him or her everyday. I feel like i've been played she never loved me. I literally don't know anything i'm just purely blank. I've never imagined myself without her and her behaviour for me made me even worse shadow of me. She's just disapperaing without a word, turning what we had into nothing, she's making me doubt my worth in her life, my heart, my everything. All i needed was just a little love from her , little care. Was that too much to give me. I wanted a partner who can make me stop overthink not someone who says <strong>\"Jo smjhna hai smjho\"</strong>. No more forcing her if she can go a whole day without talking to me, Then no matter how much it hurts i think i'll not text her again. Maybe my final act of love is just accepting to be a just friend to someone i imagined my life with. I've realised loving too much doesn't make someone stay. I hoped for us that we don't turn into strangers but maybe that was my destiny. All this stuff made me believe that she always wanted to get rid of me. No replying even if when she was online, asking me for space, asking us to turn our relationship back into friendship i should have understood that. But what hurts more is my abundunt love for her and my nostalgic emotive memories with her. I just feel to cry out loud somewhere where no one will hear me. I'm just so fucked up right now i'm not getting should i even try to make things back good but it doesn't matter cuz my love is one sided. I wish i could erase my memories with her if i can't be with her. The time i spent with her, watching movies in mall, having food together, having ride together, my kiss. I'm breaked so fucking hard that idk how to heal now im just JADED CYNIC. I've no friend also to tell him the stuff happening with me i thought she's the only one with me but now no one. I can't afford loving someone now. FUCCCCCKKKKKKKK I'M STUCK SOMEWHERE IDK. Well i don't have any option i've to suffer from this feeling and let it make me familiar so that i'll stop reacting over and over on this thing. But i won't approach her i gave enough chances to her maybe she doesn't wanted me at all because ik she loved her ex's when she was in relationship with them but when it was my turn i got nothing. I better not contact her in any case if she wants to she will most probably she won't. Its easy for her to find another one rather sticking to me. Cuz she have many choices or options always. And in my case i just hate myself looking into mirror for looking like a crap. That's what girls do right !? maybe yes maybe no. I think i lost my ability to love someone soulely. I'll just leave now see yaa and a message for future me -> <strong>Hey rachit, ik i'm hurt so much but i'll not make this my weakness this time shall too pass i'll grind more and achieve aim single handedly and i'll try to not fall in love again with someone. GGs</strong>                [NEWPAGE] Today is June 4. My inner heart is still waiting for things to get better with her. I'm just thinking of texting her and ask out clearly what does she thinks about this the         const book = document.getElementById('book');
        let leaves = [];
        let currentLeaf = 0;

        function paginate() {
       
            book.innerHTML = '<div class="spine"></div>';
            leaves = [];
            currentLeaf = 0;

            let tempDiv = document.createElement('div');
            tempDiv.style.cssText = "width:400px; padding:35px; line-height:1.6; font-size:15px; font-family:'Poppins', sans-serif; visibility:hidden; position:absolute; box-sizing:border-box; text-align:justify; hyphens:none; word-break:keep-all;";
            document.body.appendChild(tempDiv);

            const segments = textData.split(/\[NEWPAGE\]/);

            let pagesText = [];

            for (let seg of segments) {
                seg = seg.trim();
                if (!seg) continue;

                let words = seg.split(' ');
                let currentText = "";

                for (let word of words) {
                    let testText = currentText + word + " ";
                    tempDiv.innerHTML = testText;
                    if (tempDiv.scrollHeight > 490) {
                        pagesText.push(currentText);
                        currentText = word + " ";
                    } else {
                        currentText = testText;
                    }
                }
                pagesText.push(currentText); 
            }

            document.body.removeChild(tempDiv);

            for (let i = 0; i < pagesText.length; i += 2) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.style.zIndex = Math.floor(pagesText.length / 2) - Math.floor(i / 2);
                leaf.innerHTML = `
                    <div class="page front">${pagesText[i] || ""}</div>
                    <div class="page back">${pagesText[i + 1] || "..."}</div>
                `;
                book.appendChild(leaf);
                leaves.push(leaf);
            }
        }

        if (document.fonts) {
            document.fonts.ready.then(() => { paginate(); });
        } else {
            window.onload = paginate;
        }

        let isFlipping = false;
        const FLIP_MS = 1100; 

        function startFlipLock() {
            isFlipping = true;
            document.body.classList.add('flipping');
        }
        function endFlipLock() {
            isFlipping = false;
            document.body.classList.remove('flipping');
        }

        function nextPage() {
            if (isFlipping) return;
            if (currentLeaf < leaves.length) {
                startFlipLock();
                const leaf = leaves[currentLeaf];
                // bring leaf to top so it visually lifts above everything
                leaf.style.zIndex = 999;
                leaf.classList.remove('flipping-backward', 'flipping-forward');
                // force reflow so animation restarts cleanly
                void leaf.offsetWidth;
                leaf.classList.add('flipping-forward');
                currentLeaf++;
                setTimeout(() => {
                    leaf.classList.remove('flipping-forward');
                    leaf.classList.add('flipped');
                    leaf.style.zIndex = currentLeaf + 100;
                    endFlipLock();
                }, FLIP_MS);
            }
        }

        function prevPage() {
            if (isFlipping) return;
            if (currentLeaf > 0) {
                startFlipLock();
                currentLeaf--;
                const leaf = leaves[currentLeaf];
                leaf.style.zIndex = 999;
                leaf.classList.remove('flipped', 'flipping-forward', 'flipping-backward');
                void leaf.offsetWidth;
                leaf.classList.add('flipping-backward');
                setTimeout(() => {
                    leaf.classList.remove('flipping-backward');
                    leaf.style.zIndex = leaves.length - currentLeaf;
                    endFlipLock();
                }, FLIP_MS);
            }
        }

        function createStars() {
            const container = document.createElement('div');
            container.className = 'stars-container';
            document.body.appendChild(container);
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                container.appendChild(star);
            }
        }

        window.onload = function () {
            paginate();
            createStars();
        };

        function hideGalaxyNotice() {
            document.getElementById("galaxyNoticeOverlay").style.display = "none";
        }

        document.getElementById('fs-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
    </script>
