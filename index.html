<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Diary | Rachh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif; /* Font changed to Poppins */
        }

        .book-wrapper {
            background: #3e2723;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #2d1b18;
            position: relative;
        }

        .book {
            width: 800px;
            height: 520px;
            position: relative;
            perspective: 3000px;
        }

        .leaf {
            position: absolute;
            width: 50%;
            height: 100%;
            right: 0;
            transform-origin: left center;
            transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            z-index: 1;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f5f5dc;
            backface-visibility: hidden;
            padding: 35px; 
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.05);
            border-radius: 0 5px 5px 0;
            text-align: justify; 
            hyphens: auto;
            font-size: 15px; 
            line-height: 1.6;
            overflow: hidden; /* Extra text hide karne ke liye */
        }

        .front {
            z-index: 2;
            background: linear-gradient(to right, #fdf6e3 95%, #e0e0c0 100%);
        }

        .back {
            transform: rotateY(-180deg);
            z-index: 1;
            border-radius: 5px 0 0 5px;
            background: linear-gradient(to left, #fdf6e3 95%, #e0e0c0 100%);
        }

        .flipped {
            transform: rotateY(-180deg) skewY(-1deg) scale(1.01);
        }

        .spine {
            position: absolute;
            left: 50%;
            width: 6px;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.4), transparent);
            z-index: 20;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .controls { margin-top: 40px; }
        
        button {
            padding: 12px 35px;
            cursor: pointer;
            background: #9d9b9b;
            color: #d7ccc8;
            border: 1px solid #444;
            border-radius: 50px;
            transition: 0.4s;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background: #5d4037;
            box-shadow: 0 0 15px rgba(93, 64, 55, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="book-wrapper">
    <div class="spine"></div>
    <div id="book" class="book"></div>
</div>

<div class="controls">
    <button onclick="prevPage()">Previous</button>
    <button onclick="nextPage()">Next Page</button>
</div>
<script>
    //TEXT HERE BRODYYYY


    const textData = ("HEY !! i'm Ra... Nevermind it doesn't matter whatever my name is. I dont think so anyone is going to find this weirdo virtual diary. Cuz only i've link to access this so make sense right 😄. Idk what am i gonna write in this i usually feel sometimes and i think maybe i should note down my feelings somehwere so yeah here i'm.");

    const book = document.getElementById('book');
    let leaves = [];
    let currentLeaf = 0;

    function paginate() {
        let tempDiv = document.createElement('div');
        // Iski width aur style exact page CSS jaisi honi chahiye calculation ke liye
        tempDiv.style.cssText = "width:400px; padding:35px; line-height:1.6; font-size:15px; font-family:'Poppins'; visibility:hidden; position:absolute; box-sizing:border-box; text-align:justify;";
        document.body.appendChild(tempDiv);

        let words = textData.split(' ');
        let pagesText = [];
        let currentText = "";

        for (let word of words) {
            tempDiv.innerText = currentText + word + " ";
            // 520px height hai, toh 480-490 safety margin hai
            if (tempDiv.scrollHeight > 510) { 
                pagesText.push(currentText);
                currentText = word + " ";
            } else {
                currentText += word + " ";
            }
        }
        pagesText.push(currentText);
        document.body.removeChild(tempDiv);

        for (let i = 0; i < pagesText.length; i += 2) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.zIndex = Math.floor(pagesText.length / 2) - Math.floor(i/2);
            
            leaf.innerHTML = `
                <div class="page front">${pagesText[i] || ""}</div>
                <div class="page back">${pagesText[i+1] || "Next Part Soon..."}</div>
            `;
            book.appendChild(leaf);
            leaves.push(leaf);
        }
    }

    function nextPage() {
        if (currentLeaf < leaves.length) {
            leaves[currentLeaf].classList.add('flipped');
            leaves[currentLeaf].style.zIndex = currentLeaf + 100;
            currentLeaf++;
        }
    }

    function prevPage() {
        if (currentLeaf > 0) {
            currentLeaf--;
            leaves[currentLeaf].classList.remove('flipped');
            leaves[currentLeaf].style.zIndex = leaves.length - currentLeaf;
        }
    }

    paginate();
</script>
</body>
</html>
