<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Log Timestamps</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #111a22, #1b2a38, #16222d, #0d161d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        input[type="text"] {

            user-select: auto;
            -webkit-user-select: auto;
            -ms-user-select: auto;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .college-logo {
            width: 200px;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.5));
        }

        .header-titles h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #e0e0e0;
        }

        .header-titles h2 {
            margin: 5px 0 0 0;
            font-size: 1rem;
            color: #4da8da;
            font-weight: 500;
        }

        #liveClock {
            font-size: 1.5rem;
            font-weight: bold;
            color: #a8d0e6;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 40px;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .action-panel {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .action-panel h3 {
            margin-bottom: 25px;
            font-size: 1.3rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4da8da;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(77, 168, 218, 0.5);
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-arrived {
            background-color: #3498db;
        }

        .btn-arrived:hover:not(:disabled) {
            background-color: #2980b9;
        }

        .btn-voted {
            background-color: #9b59b6;
        }

        .btn-voted:hover:not(:disabled) {
            background-color: #8e44ad;
        }

        .status-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            display: none;
            box-sizing: border-box;
        }

        .show {
            display: block;
        }

        .status-success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .status-error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .status-warning {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid #f1c40f;
        }

        .info-panel {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-box h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: #a8d0e6;
        }

        .stat-box span {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .log-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            max-height: 250px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-box h4 {
            margin: 0 0 15px 0;
            color: #a8d0e6;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
        }

        .log-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loader */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.85rem;
            color: #888;
            margin-top: auto;
        }

        footer span {
            color: #b0c4de;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .login-box h3 {
            margin: 0 0 20px 0;
            color: #a8d0e6;
            letter-spacing: 1px;
        }

        .login-error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            font-weight: 500;
        }
        input[type="text"], 
input[type="password"] {
    width: 100%;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #4da8da;
    background: rgba(0, 0, 0, 0.2);
    color: white;
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 20px;
    outline: none;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

.login-box button {
    width: 100%;
}
    </style>
</head>

<body>

    <header>
        <div class="logo-title-group">
            <img src="https://i.postimg.cc/RFNkFsgd/9.png" alt="College Logo" class="college-logo">
            <div class="header-titles">
                <h1>VIT IC Election's 2026</h1>
                <h2>Admin Panel and Log Timestamps</h2>
            </div>
        </div>
        <div id="liveClock">00:00:00</div>
    </header>

    <main class="main-container">
        <section class="panel action-panel">
            <h3>Student Verification</h3>
            <input type="text" id="rollInput" placeholder="Enter Roll Number" autocomplete="off">

            <div class="button-group">
                <button id="btnArrived" class="btn-arrived" onclick="handleAction('arrived')">
                    <div id="spinArrived" class="spinner"></div>
                    <span id="textArrived">Mark Arrived</span>
                </button>
                <button id="btnVoted" class="btn-voted" onclick="handleAction('voted')">
                    <div id="spinVoted" class="spinner"></div>
                    <span id="textVoted">Mark Voted</span>
                </button>
            </div>

            <div id="statusMessage" class="status-area"></div>
        </section>

        <aside class="panel info-panel">
            <div class="stats-grid">
                <div class="stat-box">
                    <h4>Total Arrived</h4>
                    <span id="countArrived" style="color: #3498db;">0</span>
                </div>
                <div class="stat-box">
                    <h4>Total Voted</h4>
                    <span id="countVoted" style="color: #9b59b6;">0</span>
                </div>
            </div>

            <div class="log-box">
                <h4>Recent Activity</h4>
                <ul id="activityLog" class="log-list">
                    <li style="color: #888;">System initialized... Waiting for entries.</li>
                </ul>
            </div>
        </aside>
    </main>

    <footer>
        Designed & Developed by <span>Rachit Shrirame</span> | Team: Satvik, Rakesh
    </footer>

    <div id="adminLoginOverlay" class="login-overlay">
        <div class="login-box">
            <h3>Admin Security</h3>
            <input type="text" id="adminUser" placeholder="Username" autocomplete="off">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkAdminLogin()" class="btn-arrived">Unlock Dashboard</button>
            <div id="loginError" class="login-error">Wrong Username or Password!</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyZ37GQBarC83p_Qyt237R4yBt4iMUA8W7sDPgQ4DJMvnv9n4ZlqJC7D3qdvD34gWVB/exec';

        const rollInput = document.getElementById('rollInput');
        const statusMessage = document.getElementById('statusMessage');
        const btnArrived = document.getElementById('btnArrived');
        const btnVoted = document.getElementById('btnVoted');
        const activityLog = document.getElementById('activityLog');

        let arrivedCount = 0;
        let votedCount = 0;

        // Live Clock
        setInterval(() => {
            document.getElementById('liveClock').textContent = new Date().toLocaleTimeString();
        }, 1000);

        rollInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleAction('arrived');
            }
        });

        function showStatus(message, type, icon) {
            statusMessage.className = `status-area show status-${type}`;
            statusMessage.innerHTML = `${icon} &nbsp; ${message}`;
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 3000);
        }

        function toggleLoading(action, isLoading) {
            const btn = action === 'arrived' ? btnArrived : btnVoted;
            const spin = action === 'arrived' ? document.getElementById('spinArrived') : document.getElementById('spinVoted');
            const text = action === 'arrived' ? document.getElementById('textArrived') : document.getElementById('textVoted');

            btnArrived.disabled = isLoading;
            btnVoted.disabled = isLoading;
            rollInput.disabled = isLoading;

            if (isLoading) {
                spin.style.display = 'block';
                text.textContent = 'Processing...';
            } else {
                spin.style.display = 'none';
                text.textContent = action === 'arrived' ? 'Mark Arrived' : 'Mark Voted';
            }
        }

        function addLog(roll, action) {
            if (activityLog.children.length === 1 && activityLog.children[0].textContent.includes("System initialized")) {
                activityLog.innerHTML = "";
            }

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const li = document.createElement('li');

            if (action === 'arrived') {
                li.innerHTML = `✅ <b>${roll}</b> arrived at ${time}`;
            } else {
                li.innerHTML = `🗳️ <b>${roll}</b> voted at ${time}`;
            }

            activityLog.insertBefore(li, activityLog.firstChild);

            if (activityLog.children.length > 15) {
                activityLog.removeChild(activityLog.lastChild);
            }
        }

        function updateStats(action) {
            if (action === 'arrived') {
                arrivedCount++;
                document.getElementById('countArrived').textContent = arrivedCount;
            } else if (action === 'voted') {
                votedCount++;
                document.getElementById('countVoted').textContent = votedCount;
            }
        }

        async function handleAction(actionType) {
            const rollNumber = rollInput.value.trim();

            if (!rollNumber) {
                showStatus('Please enter a Roll Number', 'error', '⚠️');
                rollInput.focus();
                return;
            }

            toggleLoading(actionType, true);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ roll: rollNumber, action: actionType })
                });

                let result = "";
                try { result = (await response.text()).trim(); } catch { result = ""; }

                if (result === 'SUCCESS' || result === '') {
                    showStatus('Successfully updated!', 'success', '✅');
                    addLog(rollNumber, actionType); // Update Activity Log
                    updateStats(actionType);        // Update Live Counters

                    if (actionType === 'voted') {
                        rollInput.value = ""; // Clear input after successful vote
                    }
                }
                else if (result === 'ALREADY_VOTED') showStatus('Voter has already voted!', 'warning', '⛔');
                else if (result === 'ALREADY_ENTERED') showStatus('Already marked as entered!', 'warning', '⚠️');
                else if (result === 'NOT_ENTERED') showStatus('Mark Entry first!', 'warning', '⚠️');
                else if (result === 'NOT_FOUND') showStatus('Roll Number not found!', 'error', '❌');
                else showStatus('Action completed', 'success', '✅');

            } catch (error) {
                console.error('API Error:', error);
                showStatus('Network issue but request sent', 'warning', '📡');
            } finally {
                toggleLoading(actionType, false);
                rollInput.focus();
                rollInput.select();
            }
        }

        function checkAdminLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const errorMsg = document.getElementById('loginError');

            if (user === 'ADMIN007' && pass === 'EXTC007') {
                document.getElementById('adminLoginOverlay').style.display = 'none';
                document.getElementById('rollInput').focus();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('adminPass').value = '';
            }
        }

        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAdminLogin();
        });
    </script>
</body>

</html>
